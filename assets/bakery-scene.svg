<?xml version="1.0" encoding="UTF-8"?>
<svg id="bakeryScene" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220">
<style>
.outline{fill:none;stroke:#fff;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
.glow{fill:#ffb347;opacity:.15}
.steam{fill:none;stroke:#fff;stroke-width:2}
</style>

<g id="oven">
 <rect class="outline" x="40" y="55" width="160" height="120" rx="8"/>
 <circle class="glow" cx="120" cy="115" r="40">
   <animate attributeName="opacity" values=".08;.25;.08" dur="2s" repeatCount="indefinite"/>
 </circle>
 <g id="door">
   <rect class="outline" x="70" y="75" width="100" height="80" rx="4">
      <animateTransform attributeName="transform" type="rotate"
      values="0 70 155;-65 70 155;-65 70 155;0 70 155"
      keyTimes="0;0.18;0.45;0.55" dur="15s" repeatCount="indefinite"/>
   </rect>
 </g>

 <path class="steam" d="M118 70 C125 55 110 45 118 30">
   <animateTransform attributeName="transform" type="translate"
   values="0 0;0 -10;0 0" dur="2.8s" repeatCount="indefinite"/>
 </path>
 <path class="steam" d="M100 72 C95 60 105 45 98 30">
   <animateTransform attributeName="transform" type="translate"
   values="0 0;0 -8;0 0" dur="2.2s" repeatCount="indefinite"/>
 </path>
</g>

<g id="counter">
 <line class="outline" x1="730" y1="160" x2="1140" y2="160"/>
</g>

<g id="baker">
 <animateTransform attributeName="transform" type="translate"
 values="0 0;180 0;180 0;520 0;0 0"
 keyTimes="0;0.40;0.52;0.82;1"
 dur="15s" repeatCount="indefinite"/>

 <circle class="outline" cx="300" cy="75" r="18"/>
 <path class="outline" d="M286 58 q14-18 28 0"/>
 <line class="outline" x1="300" y1="93" x2="300" y2="145"/>
 <line class="outline" x1="300" y1="108" x2="280" y2="128"/>
 <line class="outline" x1="300" y1="108" x2="320" y2="128"/>
 <line class="outline" x1="300" y1="145" x2="284" y2="172"/>
 <line class="outline" x1="300" y1="145" x2="316" y2="172"/>

 <g id="tray">
   <rect class="outline" x="325" y="116" width="42" height="10" rx="2">
     <animate attributeName="opacity" values="0;0;1;1;0"
     keyTimes="0;0.42;0.45;0.82;0.83" dur="15s" repeatCount="indefinite"/>
   </rect>
 </g>
</g>

<g id="pastries">
 <path class="outline" d="M865 150 q10-12 20 0 q10-12 20 0"/>
 <path class="outline" d="M930 150 q10-12 20 0 q10-12 20 0"/>
 <path class="outline" d="M995 150 q10-12 20 0 q10-12 20 0"/>
</g>

</svg>
